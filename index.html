<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaibhav Satish - Portfolio</title>
    <style>
        :root {
            --bg-color: #090a0f;
            --card-bg: rgba(20, 21, 33, 0.45); 
            --accent-primary: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.2);
            --text-main: #ededf4;
            --text-muted: #8c8fa3;
            --border-color: rgba(255, 255, 255, 0.12);
            --border-glow: rgba(0, 255, 136, 0.4);
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            text-align: center;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Interactive Particle Background Canvas spanning the entire viewport */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        header {
            padding: 2.5rem 1rem 1.5rem 1rem;
            background: transparent;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        header h1 {
            font-family: inherit;
            color: var(--text-main);
            margin: 0 0 1rem 0;
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header h1 u {
            text-decoration: none;
            border-bottom: 2px solid var(--accent-primary);
            padding-bottom: 4px;
        }

        footer {
            background-color: transparent;
            width: 100%;
            text-align: center;
            padding: 2rem 0;
            font-family: inherit;
            color: var(--text-muted);
            font-size: 0.95rem;
            position: relative;
            z-index: 10;
        }

        main {
            max-width: 900px;
            width: 90%;
            margin: auto;
            padding: 2rem 1rem;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .hero-container {
            position: relative;
            width: 100%;
            max-width: 750px;
            padding: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        p {
            margin: 0;
            padding: 2.5rem;
            color: var(--text-main);
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            text-align: center;
            font-size: 1.15rem;
            line-height: 1.7;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .hero-container:hover p {
            transform: translateY(-3px);
            border-color: var(--border-glow);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.5), 0 0 25px var(--accent-glow);
        }

        /* Keep words intact during line wrapping */
        .word {
            display: inline-block;
            white-space: nowrap;
        }

        /* Fade-in animation for each individual character inside words */
        .char {
            opacity: 0;
            display: inline-block;
            animation: fadeInChar 0.05s forwards;
        }

        @keyframes fadeInChar {
            to {
                opacity: 1;
            }
        }

        nav {
            text-align: center;
            margin-top: 1rem;
        }

        nav a {
            margin: 0 1.2rem;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: var(--accent-primary);
        }
    </style>
</head>
<body>

    <!-- Particle Background Canvas (Covers Entire Viewport) -->
    <canvas id="particle-canvas"></canvas>

    <header>
        <h1><u>Vaibhav Adithya Satish</u></h1>
        <nav>
            <a href="Projects.html">Projects</a>
            <a href="Resume.html">Resume</a>
            <a href="Contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <div class="hero-container">
            <p id="typing-target"></p>
        </div>
    </main>
    
    <footer>
        &copy; 2025 Vaibhav Satish
    </footer>

    <script>
        // --- Particle Background Script ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        let particlesArray;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const mouse = {
            x: null,
            y: null,
            radius: 150
        };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.clientX;
            mouse.y = event.clientY;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        class Particle {
            constructor(x, y, directionX, directionY, size) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                // Increased opacity from 0.4 to 0.85 for brighter dots
                ctx.fillStyle = 'rgba(0, 255, 136, 0.85)';
                ctx.fill();
            }

            update() {
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function initParticles() {
            particlesArray = [];
            // Increased density factor from 10000 to 8000 for more particles overall
            let numberOfParticles = (canvas.width * canvas.height) / 8000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2.2) + 1.2; // Slightly larger size range
                let x = (Math.random() * ((canvas.width - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((canvas.height - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 0.8) - 0.4;
                let directionY = (Math.random() * 0.8) - 0.4;
                particlesArray.push(new Particle(x, y, directionX, directionY, size));
            }
        }

        function connectParticles() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a + 1; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) +
                                 ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width / 8) * (canvas.height / 8)) {
                        opacityValue = 1 - (distance / 15000);
                        // Increased line brightness multiplier from 0.15 to 0.35
                        ctx.strokeStyle = `rgba(0, 255, 136, ${opacityValue * 0.35})`;
                        ctx.lineWidth = 1.1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }

                if (mouse.x !== undefined && mouse.y !== undefined) {
                    let mouseDistance = ((particlesArray[a].x - mouse.x) * (particlesArray[a].x - mouse.x)) +
                                        ((particlesArray[a].y - mouse.y) * (particlesArray[a].y - mouse.y));
                    if (mouseDistance < mouse.radius * mouse.radius) {
                        let mouseOpacity = 1 - (mouseDistance / (mouse.radius * mouse.radius));
                        // Boosted mouse interaction line opacity from 0.35 to 0.65
                        ctx.strokeStyle = `rgba(0, 255, 136, ${mouseOpacity * 0.65})`;
                        ctx.lineWidth = 1.2;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animateParticles() {
            requestAnimationFrame(animateParticles);
            ctx.clearRect(0, 0, innerWidth, innerHeight);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connectParticles();
        }

        initParticles();
        animateParticles();


        // --- Typing Effect Script ---
        const text = "Welcome  to my website! I'm a Computer Science student at UC Irvine specializing in Intelligent Systems. I built this website for fun and to provide access to some of the cool things that I have built over the years.";
        const target = document.getElementById("typing-target");
        
        const words = text.split(" ");
        let wordIndex = 0;
        let charIndex = 0;

        function typeWriter() {
            if (wordIndex < words.length) {
                let currentWord = words[wordIndex];
                
                if (charIndex === 0) {
                    const wordSpan = document.createElement("span");
                    wordSpan.className = "word";
                    wordSpan.id = "word-" + wordIndex;
                    target.appendChild(wordSpan);
                    
                    if (wordIndex > 0) {
                        target.appendChild(document.createTextNode(" "));
                    }
                }

                const wordSpan = document.getElementById("word-" + wordIndex);
                const charSpan = document.createElement("span");
                charSpan.className = "char";
                charSpan.textContent = currentWord.charAt(charIndex);
                wordSpan.appendChild(charSpan);

                charIndex++;

                if (charIndex >= currentWord.length) {
                    wordIndex++;
                    charIndex = 0;
                }

                setTimeout(typeWriter, 25);
            }
        }

        window.onload = typeWriter;
    </script>
</body>
</html>

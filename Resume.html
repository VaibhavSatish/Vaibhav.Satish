<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaibhav Satish - Resume</title>
    <style>
        :root {
            --bg-color: #090a0f;
            --header-bg: #0d0e15;
            --card-bg: rgba(20, 21, 33, 0.65);
            --accent-primary: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.2);
            --text-main: #ededf4;
            --text-muted: #8c8fa3;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(0, 255, 136, 0.3);
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--header-bg);
            padding: 1.5rem 0;
            text-align: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 2px solid var(--border-color);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        header h1 {
            margin: 0;
            font-family: inherit;
            color: var(--text-main);
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        nav {
            margin-top: 0.8rem;
        }

        nav a {
            margin: 0 1.2rem;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: var(--accent-primary);
        }

        iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: calc(100vh - 110px); 
            margin-top: 110px;
            background-color: var(--bg-color);
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-family: inherit;
            background-color: var(--header-bg);
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <header>
        <h1>Resume</h1>
        <nav>
            <a href="Projects.html">Projects</a>
            <a href="index.html">Home</a>
            <a href="Contact.html">Contact</a>
        </nav>
    </header>

    <iframe src="vaibhav_satish.pdf"></iframe>

    <footer>
        &copy; 2025 Vaibhav Satish
    </footer>
</body>
</html>

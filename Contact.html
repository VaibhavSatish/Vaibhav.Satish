<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaibhav Satish - Contact</title>
    <style>
        :root {
            --bg-color: #090a0f;
            --header-bg: #0d0e15;
            --card-bg: rgba(20, 21, 33, 0.65);
            --accent-primary: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.2);
            --text-main: #ededf4;
            --text-muted: #8c8fa3;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(0, 255, 136, 0.3);
        }

        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            text-align: center;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        header {
            padding: 2.5rem 1rem;
            background: var(--header-bg);
            border-bottom: 2px solid var(--border-color);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        header h1 {
            font-family: inherit;
            color: var(--text-main);
            margin: 0 0 1rem 0;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        nav {
            margin-top: 1rem;
        }

        nav a {
            margin: 0 1.2rem;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: var(--accent-primary);
        }

        main {
            max-width: 800px;
            width: 90%;
            margin: auto;
            padding: 2rem;
            flex: 1;
        }

        table {
            width: 100%;
            max-width: 600px;
            margin: auto;
            border-collapse: collapse;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            background-color: var(--card-bg);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            margin-top: 3px;

            opacity: 0;
            transform: translateY(30px);
            animation: fadeSlideUp 1s ease forwards;
            animation-delay: 0.3s;
        }

        th, td {
            padding: 1rem 1.5rem;
            text-align: center;
        }

        th {
            font-family: inherit;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            color: var(--text-muted);
        }

        td a {
            color: var(--accent-primary);
            font-weight: 500;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        td a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        tr:nth-child(even) td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        img.profile-pic {
            border-style: solid;
            border-width: 2px;
            border-color: var(--border-color);
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 30px auto 0 auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(-30px);
            animation: fadeSlideDown 1s ease forwards;
            animation-delay: 0.1s;
        }

        form {
                margin-top: 2rem;
                text-align: center; 
                max-width: 600px;
                margin-left: auto;
                margin-right: auto;
                background-color: var(--card-bg);
                padding: 2rem;
                border-radius: 20px;
                border: 1px solid var(--border-color);
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(12px);

                opacity: 0;
                transform: translateY(30px);
                animation: fadeSlideUp 1s ease forwards;
                animation-delay: 0.6s;
        }

        form label {
                color: var(--text-muted);
                font-weight: 500;
                display: block; 
                margin-bottom: 5px;
                text-align: left;
                margin-left: 10%;
        }

        form input, form textarea {
                width: 80%;          
                padding: 12px;
                margin: 0 auto 15px auto; 
                border-radius: 12px;
                border: 1px solid var(--border-color);
                background-color: rgba(13, 14, 21, 0.8);
                color: var(--text-main);
                display: block;
                resize: none;
                font-family: inherit;  
        }

        form input:focus, form textarea:focus {
                outline: none;
                border-color: var(--border-glow);
                box-shadow: 0 0 15px var(--accent-glow);
        }

        form button {
                padding: 12px 25px;
                border-radius: 12px;
                background-color: var(--accent-primary);
                color: #090a0f;
                font-weight: 600;
                cursor: pointer;
                border: none;
                transition: transform 0.2s ease, opacity 0.2s ease;
                display: block;
                margin: 0 auto;
                font-family: inherit;
        }

        form button:hover {
                opacity: 0.9;
                transform: translateY(-2px);
        }

        .social-links {
            margin-top: 2rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeSlideUp 1s ease forwards;
            animation-delay: 0.8s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .social-links a img {
            width: 32px;
            height: 32px;
            /* Tinting icons to match the emerald theme via CSS filter or using direct monochrome styling */
            filter: invert(75%) sepia(30%) saturate(800%) hue-rotate(90deg) brightness(95%) contrast(100%);
            transition: opacity 0.2s ease;
        }

        .social-links a:hover {
            transform: scale(1.15);
        }

        .social-links a:hover img {
            opacity: 0.8;
        }

        h3 {
            color: var(--text-main);
        }

        footer {
            background-color: var(--header-bg);
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            padding: 2rem 0;
            font-family: inherit;
            color: var(--text-muted);
            font-size: 0.95rem;
            border-top: 1px solid var(--border-color);
        }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeSlideDown {
            0% {
                opacity: 0;
                transform: translateY(-30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Contact Me</h1>
        <nav>
            <a href="Projects.html">Projects</a>
            <a href="Resume.html">Resume</a>
            <a href="index.html">Home</a>
        </nav>
    </header>

    <img class="profile-pic" src="IMG_3762.jpg" alt="Profile Picture" width="300" height="300">

    <main>
        <table>
            <tr>
                <th>Phone Number</th>
                <th>Email Address</th>
            </tr>
            <tr>
                <!-- <td><a href="tel:+14253266246">+1 (425)-326-6246</a></td>
                <td><a href="mailto:Vaibhavsatish21@hotmail.com">Vaibhavsatish21@hotmail.com</a></td> -->
            </tr>
        </table>
        <hr style="border: none; height: 1px; background: var(--border-color); margin: 2rem 0;">
        <form action="https://formspree.io/f/xldlkyyo" method="post">
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" required><br>

            <label for="email">Your Email:</label><br>
            <input type="email" id="email" name="email" required><br>

            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="4" required></textarea><br>

            <button type="submit">Send Message</button>
        </form>
        <div id="form-success" style="color:var(--accent-primary); margin-top:1rem; display:none;">
            Thank you! Your message has been sent.
        </div>
        
        <script>
            const form = document.querySelector("form");
            form.addEventListener("submit", (e) => {
                e.preventDefault();
                const data = new FormData(form);
                fetch(form.action, {
                    method: form.method,
                    body: data,
                    headers: { 'Accept': 'application/json' }
                }).then(response => {
                    if (response.ok) {
                        document.getElementById("form-success").style.display = "block";
                        form.reset();
                    } else {
                        alert("Oops! There was a problem submitting your form.");
                    }
                }).catch(error => alert("Oops! There was a problem submitting your form."));
            });
        </script>

        <div class="social-links">
            <a href="https://github.com/VaibhavSatish" target="_blank" title="GitHub">
                <img src="https://api.iconify.design/mdi:github.svg" alt="GitHub Logo">
            </a>
            <a href="https://www.linkedin.com/in/vaibhav-adithya-satish" target="_blank" title="LinkedIn">
                <img src="https://api.iconify.design/mdi:linkedin.svg" alt="LinkedIn Logo">
            </a>
            <a href="https://www.instagram.com/vaibhav_satish_/" target="_blank" title="Instagram">
                <img src="https://api.iconify.design/mdi:instagram.svg" alt="Instagram Logo">
            </a>
        </div>
    </main>

    <footer>
        &copy; 2025 Vaibhav Satish
    </footer>

</body>
</html>
